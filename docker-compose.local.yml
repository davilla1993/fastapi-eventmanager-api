services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventmanager_db}
      POSTGRES_USER: ${POSTGRES_USER:-eventuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventuser} -d ${POSTGRES_DB:-eventmanager_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eventuser}:${POSTGRES_PASSWORD:-eventpass}@db:5432/${POSTGRES_DB:-eventmanager_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DEBUG: ${DEBUG:-false}
      APP_NAME: ${APP_NAME:-Event Management API}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-["*"]}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
